name: Midday Recap

on:
  workflow_dispatch:

jobs:
  midday:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance feedparser pytz numpy pandas
      - run: python recap_engine.py
        env:
          RECAP_TYPE: midday
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
