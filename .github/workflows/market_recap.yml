name: Market Recap Automation

on:
  schedule:
    # 5:00 AM PDT = 12:00 UTC — schedule 30 min early
    - cron: '30 11 * * 1-5'
    # 7:30 AM PDT = 14:30 UTC — schedule 30 min early
    - cron: '0 14 * * 1-5'
    # 4:00 PM PDT = 23:00 UTC — schedule 30 min early
    - cron: '30 22 * * 1-5'

  workflow_dispatch:
    inputs:
      recap_type:
        description: 'morning / midday / close'
        required: true
        default: 'morning'

jobs:
  morning-recap:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.recap_type == 'morning' || (github.event_name == 'schedule' && startsWith(github.event.schedule, '30 11'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance feedparser pytz numpy pandas
      - run: python recap_engine.py
        env:
          RECAP_TYPE: morning
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

  midday-recap:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.recap_type == 'midday' || (github.event_name == 'schedule' && startsWith(github.event.schedule, '0 14'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance feedparser pytz numpy pandas
      - run: python recap_engine.py
        env:
          RECAP_TYPE: midday
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

  close-recap:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.recap_type == 'close' || (github.event_name == 'schedule' && startsWith(github.event.schedule, '30 22'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance feedparser pytz numpy pandas
      - run: python recap_engine.py
        env:
          RECAP_TYPE: close
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
