ame: Options Bot — Daily Regime Engine

on:
  schedule:
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

jobs:
  run-regime-engine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Run Options Bot
        env:
          TT_SANDBOX_USERNAME: ${{ secrets.TT_SANDBOX_USERNAME }}
          TT_SANDBOX_PASSWORD: ${{ secrets.TT_SANDBOX_PASSWORD }}
          TT_SANDBOX_ACCOUNT: ${{ secrets.TT_SANDBOX_ACCOUNT }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.GMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: cd options_bot && python combined_run.py

      - name: Commit trade log
        run: |
          git config user.name "options-bot"
          git config user.email "bot@github.com"
          git add options_bot/trade_log.csv
          git diff --staged --quiet || git commit -m "Trade log update $(date +%Y-%m-%d)"
          git push
