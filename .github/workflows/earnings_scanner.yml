name: Options Bot — Earnings Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1'

jobs:
  earnings-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance lxml

      - name: Run Earnings Scanner
        env:
          PYTHONPATH: ${{ github.workspace }}/options_bot
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.GMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TT_SANDBOX_USERNAME: ${{ secrets.TT_SANDBOX_USERNAME }}
          TT_SANDBOX_PASSWORD: ${{ secrets.TT_SANDBOX_PASSWORD }}
          TT_SANDBOX_ACCOUNT: ${{ secrets.TT_SANDBOX_ACCOUNT }}
        run: python options_bot/phase7_earnings.py
