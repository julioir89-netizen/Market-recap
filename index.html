<style>
:root {
  --bg:     #070a0f;
  --bg2:    #0d1117;
  --bg3:    #0a0d14;
  --border: #1e2a3a;
  --text:   #e2e8f0;
  --muted:  #475569;
  --dim:    #334155;
  --gold:   #c9a84c;
  --green:  #22c55e;
  --blue:   #3b82f6;
  --red:    #ef4444;
  --orange: #f97316;
  --purple: #8b5cf6;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; overflow: hidden; }
 
/* LAYOUT */
.app { display: flex; flex-direction: column; height: 100vh; }
.header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 14px; padding-top: max(10px, var(--safe-top)); flex-shrink: 0; }
.inner-tabs { display: flex; background: var(--bg3); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
.inner-tabs::-webkit-scrollbar { display: none; }
.content { flex: 1; overflow-y: auto; padding: 12px 14px; padding-bottom: max(12px, var(--safe-bot)); }
.bottom-nav { background: var(--bg2); border-top: 1px solid var(--border); display: flex; flex-shrink: 0; padding-bottom: max(0px, var(--safe-bot)); }
 
/* HEADER */
.hdr-row { display: flex; justify-content: space-between; align-items: center; }
.hdr-title { font-size: 9px; color: var(--gold); letter-spacing: 3px; margin-bottom: 2px; }
.hdr-name { font-size: 16px; font-weight: bold; color: #fff; }
.hdr-live { display: flex; align-items: center; gap: 5px; margin-top: 2px; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; }
.live-txt { font-size: 9px; }
.score-badge { text-align: center; border-radius: 8px; padding: 5px 12px; min-width: 58px; }
.score-num { font-size: 22px; font-weight: bold; }
.score-lbl { font-size: 8px; letter-spacing: 1px; }
 
/* MINI STATS */
.mini-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; margin-top: 8px; }
.mini-stat { background: var(--bg3); border-radius: 5px; padding: 5px; text-align: center; }
.mini-val { font-size: 10px; font-weight: bold; }
.mini-lbl { font-size: 7px; color: var(--dim); margin-top: 1px; }
 
/* INNER TABS */
.itab { flex-shrink: 0; padding: 8px 12px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-size: 8px; letter-spacing: 1px; cursor: pointer; font-family: inherit; text-transform: uppercase; white-space: nowrap; }
.itab.active { color: var(--gold); border-bottom-color: var(--gold); }
 
/* BOTTOM NAV */
.bnav-btn { flex: 1; padding: 10px 4px 8px; background: none; border: none; cursor: pointer; font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.bnav-icon { font-size: 18px; }
.bnav-lbl { font-size: 8px; letter-spacing: 0.5px; }
 
/* CARDS */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
.card-lbl { font-size: 8px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
.card-accent { border-left: 3px solid; }
 
/* GRIDS */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
.g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; }
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
.stat-v { font-size: 15px; font-weight: bold; }
.stat-l { font-size: 8px; color: var(--muted); margin-top: 2px; letter-spacing: 1px; }
 
/* ALERT */
.alert { border-left: 4px solid; border-radius: 8px; padding: 11px 12px; margin-bottom: 8px; }
.alert-hdr { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.badge { font-size: 9px; font-weight: bold; padding: 2px 7px; border-radius: 3px; }
.alert-title { font-size: 13px; font-weight: bold; color: #fff; margin-bottom: 4px; }
.alert-body { font-size: 10px; line-height: 1.4; }
 
/* HOLDING */
.holding { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid; border-radius: 8px; padding: 11px 12px; margin-bottom: 7px; }
.holding-top { display: flex; justify-content: space-between; margin-bottom: 5px; }
.holding-ticker { font-size: 13px; font-weight: bold; color: #fff; }
.holding-sector { font-size: 8px; padding: 2px 6px; border-radius: 3px; margin-left: 6px; }
.detail-cell { background: #0a0d12; border-radius: 4px; padding: 5px; text-align: center; }
.detail-lbl { font-size: 8px; color: var(--muted); }
.detail-val { font-size: 11px; margin-top: 1px; }
 
/* SCAN */
.scan-bar-row { display: flex; gap: 3px; margin-bottom: 8px; }
.scan-bar { height: 4px; flex: 1; border-radius: 2px; }
.scan-sig { display: flex; gap: 8px; padding: 4px 0; border-top: 1px solid var(--border); align-items: center; }
.scan-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
 
/* LEVELS */
.level-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 4px; margin-bottom: 5px; }
.lvl-cell { background: #0a0d12; border-radius: 4px; padding: 5px; text-align: center; }
.lvl-lbl { font-size: 8px; }
.lvl-val { font-size: 9px; color: #fff; margin-top: 1px; }
 
/* CHECKLIST */
.check-item { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid; border-radius: 8px; padding: 11px 12px; margin-bottom: 6px; cursor: pointer; }
.check-box { width: 18px; height: 18px; border-radius: 4px; border: 1px solid; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
 
/* TRACKER */
.entry-item { background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
 
/* ANALYSIS */
.step-nav { display: flex; gap: 4px; margin-bottom: 14px; overflow-x: auto; }
.step-btn { flex-shrink: 0; min-width: 38px; padding: 7px 4px; border-radius: 6px; border: 1px solid; cursor: pointer; font-family: inherit; font-size: 8px; text-align: center; }
 
/* BUTTONS */
.btn { padding: 11px; font-size: 11px; cursor: pointer; border-radius: 6px; font-family: inherit; width: 100%; letter-spacing: 0.5px; }
.btn-gold { background: rgba(201,168,76,0.15); border: 1px solid var(--gold); color: var(--gold); }
.btn-muted { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn-row { display: flex; gap: 8px; margin-top: 10px; }
 
/* FORMS */
input, select { width: 100%; font-size: 11px; padding: 7px 8px; background: #0a0d12; border: 1px solid var(--border); color: #fff; border-radius: 5px; font-family: inherit; margin-bottom: 0; }
.field { margin-bottom: 10px; }
.field-lbl { font-size: 9px; color: var(--muted); letter-spacing: 1px; margin-bottom: 5px; }
 
/* PLAYBOOK */
.playbook-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; }
.pb-title { font-size: 12px; font-weight: bold; margin-bottom: 8px; }
.pb-rule { display: flex; gap: 8px; padding: 5px 0; border-top: 1px solid var(--border); font-size: 10px; color: #64748b; }
 
/* MISC */
.sep { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
.green { color: var(--green); }
.red   { color: var(--red); }
.gold  { color: var(--gold); }
.muted { color: var(--muted); }
.bold  { font-weight: bold; }
.center { text-align: center; }
.refresh-btn { width: 100%; padding: 11px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.4); color: var(--gold); border-radius: 6px; font-family: inherit; font-size: 11px; cursor: pointer; margin-bottom: 10px; }
.empty { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 24px; text-align: center; color: var(--muted); font-size: 11px; }
.yesno { display: flex; gap: 6px; }
.yesno-btn { padding: 5px 14px; font-size: 10px; cursor: pointer; border-radius: 4px; font-family: inherit; }
.opts { display: flex; gap: 5px; flex-wrap: wrap; }
.opt-btn { padding: 4px 10px; font-size: 9px; cursor: pointer; border-radius: 4px; font-family: inherit; }
.bar-wrap { background: var(--border); border-radius: 3px; height: 4px; margin-top: 4px; }
.bar-fill { height: 100%; border-radius: 3px; }
</style>
</head>

function getHistRec(ticker, h) {
  const hist = HIST[ticker];
  if(!hist) return null;
  const btc = ticker==="BTC";
  const ma50 = h.ma50;
  const price = h.price;
  if(!ma50||!price) return null;
  const distMa50 = ((price-ma50)/ma50)*100;
  const distS1   = ((price-h.s1)/price)*100;
  const distS2   = h.s2?((price-h.s2)/price)*100:999;
 
  // Determine current zone
  if(price < h.s2)           return {zone:"BELOW_S2",  urgency:"CRITICAL", rec:hist.s2_rec,  color:"#ef4444"};
  if(distS2 <= 3)            return {zone:"NEAR_S2",   urgency:"HIGH",     rec:hist.s2_rec,  color:"#22c55e"};
  if(distMa50 >= 0 && distMa50 <= 3) return {zone:"AT_MA50",   urgency:"HIGH",     rec:hist.ma50_rec,color:hist.tierC};
  if(distMa50 > 3 && distMa50 <= 8)  return {zone:"NEAR_MA50", urgency:"MEDIUM",   rec:`Approaching MA50 zone (${distMa50.toFixed(1)}% above). ${hist.ma50_rec}`, color:hist.tierC};
  if(distS1 <= 3.5)          return {zone:"NEAR_S1",   urgency:"MEDIUM",   rec:hist.ma50_rec,color:hist.tierC};

    const sh  = parseFloat(ch.shares) || 0;
    const pd  = liveData?.prices?.[t] || {};
    const tech= liveData?.technicals?.[t] || {};
    // Use live price if available, else fall back to avg cost
    const price = pd.price || avg;
    return {
      t, n: ch.name||t, avg, sh,
      role:   ch.notes||"custom",
      color:  "#8b5cf6",
      tgt:    0,   // no target weight — excluded from drift calc
      price,
      change: pd.change || 0,
      s1:     avg * 0.95,
      s2:     avg * 0.90,
      r1:     avg * 1.10,
      r2:     avg * 1.15,
      trend:  tech.trend || null,
      rsi:    tech.rsi   || null,
      ma50:   tech.ma50  || null,
      ma200:  tech.ma200 || null,
      edited: false,
      custom: true,   // flag so we can handle differently in UI
      addedDate: ch.date||"",
    };
  });
 
  return [...core, ...custom];
}
 
function calcScore(H) {
  // Only score using core 11 holdings (not custom)
  const core = H.filter(h=>!h.custom);
  if(!core.length) return 0;
  let s = 0;
  s += Math.round((core.filter(h=>h.price>h.s1).length/core.length)*35);
  const spyP = ((core[0].price-core[0].avg)/core[0].avg)*100;
  s += spyP>0?25:spyP>-3?18:spyP>-6?10:4;
  s += (core[1].price>core[1].s1&&core[2].price>core[2].s1)?25:12;
  s += core[7].price<core[7].avg?10:15;
  return Math.min(100,s);
}
 
function dcaStatus(h) {
  const dist = ((h.price-h.s1)/h.price)*100;
  if(h.price<h.s2) return {label:"DANGER",color:"#ef4444",icon:"🚨"};
  if(dist<=1.5)    return {label:"AT S1 — BUY",color:"#22c55e",icon:"🟢"};
  if(dist<=3.5)    return {label:"NEAR S1",color:"#c9a84c",icon:"⚠️"};
  if(h.price>=h.r1*0.99) return {label:"AT R1",color:"#3b82f6",icon:"🔵"};
  return                  {label:"WAIT",color:"#6b7280",icon:"⏳"};
}
 
function getEntryPnL(e) {
  const cur = e.status==="closed"&&e.exitPrice ? e.exitPrice : (S.holdings.find(h=>h.t===e.ticker)?.price || FB_P[e.ticker] || e.entryPrice);
  const pnl = (cur-e.entryPrice)*e.shares;
  const pct = ((cur-e.entryPrice)/e.entryPrice)*100;
  return {pnl,pct,current:cur};
}
 
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if(attrs) {
    Object.entries(attrs).forEach(([k,v])=>{
      if(k==="class") el.className=v;
      else if(k==="style") el.style.cssText=v;
      else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
      else el.setAttribute(k,v);
    });
  }
  children.forEach(c => {
    if(c===null||c===undefined) return;
    if(typeof c==="string"||typeof c==="number") el.appendChild(document.createTextNode(String(c)));
    else if(c instanceof Node) el.appendChild(c);
    else if(Array.isArray(c)) c.forEach(x=>x&&el.appendChild(typeof x==="string"?document.createTextNode(x):x));
  });
  return el;
}
 
function div(cls, ...children) { return h("div",{class:cls},...children); }
function span(cls, txt, style) { const s=h("span",{class:cls||""},txt); if(style)s.style.cssText=style; return s; }

// FETCH
// ═══════════════════════════════════════════════════════════
async function fetchData() {
  try {
    const res = await fetch(GIST_URL+"?t="+Date.now());
    if(!res.ok) throw new Error("failed");
    const data = await res.json();
    if(data.prices && Object.keys(data.prices).length>0) {
      S.liveData = data;
      S.isLive = true;
      if(data.updated) {
        const d = new Date(data.updated);
        S.lastUpdate = isNaN(d) ? data.updated : d.toLocaleTimeString("en-US",{timeZone:"America/Los_Angeles",hour:"2-digit",minute:"2-digit"})+" PT";
      }
    }
  } catch(e) { S.isLive = false; }
  S.holdings = buildHoldings(S.liveData);
  S.score = calcScore(S.holdings);
  render();
}

function getInst(H) {
  const C=H.filter(h=>!h.custom);
  const sig=[C[2]?.price>C[2]?.s1,C[4]?.price>C[4]?.s1,C[0]?.price>C[0]?.s1,C[5]?.price>C[5]?.s1].filter(Boolean).length;
  return {sig,label:sig>=3?"ACCUM":sig===2?"NEUTRAL":"DIST",color:sig>=3?"#22c55e":sig===2?"#c9a84c":"#ef4444"};
}
function getCrash(H) {
  const C=H.filter(h=>!h.custom);
  let r=0;
  const sp=((C[0].price-C[0].avg)/C[0].avg)*100,qq=((C[1].price-C[1].avg)/C[1].avg)*100;
  if(sp<-5)r+=25;else if(sp<-2)r+=10;
  if(qq<-8)r+=20;else if(qq<-4)r+=10;
  if(C[7]?.price>C[7]?.avg)r+=15; if(C[8]?.price>C[8]?.avg)r+=15;
  if(C[0].price<C[0].s1)r+=15; if(C[1].price<C[1].s1)r+=10;
  r=Math.min(95,r);
  return {pct:r,label:r>=70?"HIGH":r>=40?"ELEV":r>=20?"LOW":"MIN",color:r>=70?"#ef4444":r>=40?"#f97316":r>=20?"#c9a84c":"#22c55e"};
}
function getSmart(H) {
  const C=H.filter(h=>!h.custom);
  const on=[C[2]?.price>C[2]?.s1,C[4]?.price>C[4]?.s1,C[5]?.price>C[5]?.s1,C[10]?.price>C[10]?.s1].filter(Boolean).length;
  const off=[C[7]?.price>C[7]?.avg,C[8]?.price>C[8]?.avg].filter(Boolean).length;
  return {on,off,label:on>=3&&off<=1?"RISK-ON":off>=2&&on<=1?"RISK-OFF":"MIXED",color:on>=3&&off<=1?"#22c55e":off>=2&&on<=1?"#ef4444":"#c9a84c"};
}

function genAlerts(H, score, inst) {
  const alerts = [];
  const totalV = H.reduce((s,h)=>s+h.price*h.sh,0);
 
  H.forEach(h => {
    const btc=h.t==="BTC";
    const dist=((h.price-h.s1)/h.price)*100;
    const drift=(h.price*h.sh/totalV)*100-h.tgt;
    const hist=HIST[h.t];
    const hrec=getHistRec(h.t, h);
 
    // DANGER — below S2
    if(h.price<h.s2)
      alerts.push({urgency:"CRITICAL",type:"DANGER",c:"#ef4444",ticker:h.t,
        headline:`${h.t} below S2 — DANGER`,
        action:`Below S2 ${fmt(h.s2,btc)} — no new entries. ${hist?.avoid||""}`});
 
    // HISTORICAL ZONE ALERT — price at MA50 (best historical entry)
    if(hrec && hrec.zone==="AT_MA50" && h.price>h.s2) {
      const tierLabel = hist?`[${hist.tier} · ${hist.wr90}% WR · Avg +${hist.avg90}%]`:"";
      alerts.push({urgency:"HIGH",type:"HIST ZONE",c:hrec.color,ticker:h.t,
        headline:`${h.t} at MA50 — Historical Best Entry Zone ${tierLabel}`,
        action:hrec.rec});
    }
 
    // NEAR MA50 — approaching the zone
    if(hrec && hrec.zone==="NEAR_MA50" && h.price>h.s2 && hist?.tier!=="WEAK") {
      alerts.push({urgency:"MEDIUM",type:"APPROACHING",c:hist.tierC,ticker:h.t,
        headline:`${h.t} approaching MA50 historical zone`,
        action:`${hrec.rec} Plan: ${hist?.plan||""}`});
    }
 
    // AT S1 — standard DCA zone
    if(dist<=1.5&&h.price>h.s2&&score>=45&&(!hrec||hrec.zone!=="AT_MA50"))
      alerts.push({urgency:"HIGH",type:"BUY",c:"#22c55e",ticker:h.t,
        headline:`${h.t} at S1 — DCA ready`,
        action:`${fmt(h.price,btc)} within 1.5% of S1 ${fmt(h.s1,btc)}. ${hist?.tier==="WEAK"?"⚠️ Historical win rate weak here — consider waiting for S2.":""}`});
 
    // NEAR S1
    if(dist>1.5&&dist<=3.5&&h.price>h.s2&&(!hrec||!["AT_MA50","NEAR_MA50"].includes(hrec.zone)))
      alerts.push({urgency:"MEDIUM",type:"PREPARE",c:"#c9a84c",ticker:h.t,
        headline:`${h.t} approaching S1`,
        action:`${dist.toFixed(1)}% from S1 ${fmt(h.s1,btc)}. ${hist?`Historical: ${hist.wr90}% WR at MA50.`:""} Prepare capital.`});
 
    // AT R1 + overweight
    if(h.price>=h.r1*0.99&&drift>2)
      alerts.push({urgency:"MEDIUM",type:"TRIM",c:"#3b82f6",ticker:h.t,
        headline:`${h.t} at R1 + overweight`,
        action:`At R1 ${fmt(h.r1,btc)} — consider partial trim.`});
  });
 
  if(inst.sig>=3&&score>=65) alerts.push({urgency:"HIGH",type:"OPPORTUNITY",c:"#22c55e",ticker:"MARKET",
    headline:"Institutions accumulating — go aggressive",
    action:`Score ${score}/100. Scale into historical zones.`});
 
  return alerts.sort((a,b)=>({CRITICAL:0,HIGH:1,MEDIUM:2}[a.urgency]||3)-({CRITICAL:0,HIGH:1,MEDIUM:2}[b.urgency]||3));
}

function setFilter(t) { S.trackerFilter=t; render(); }
function setNewTicker(t) { S.newEntry.ticker=t; render(); }
function startClose(id) { S.closingEntry=id; S.exitInput=""; render(); }
function cancelClose() { S.closingEntry=null; render(); }
function confirmClose(id) {
  if(!S.exitInput)return;
  S.entries=S.entries.map(e=>e.id===id?{...e,status:"closed",exitPrice:parseFloat(S.exitInput),exitDate:new Date().toISOString().split("T")[0]}:e);
  saveEntries(); S.closingEntry=null; render();
}
function deleteEntry(id) { S.entries=S.entries.filter(e=>e.id!==id); saveEntries(); render(); }
function addEntry() {
  const ne=S.newEntry;
  if(!ne.date||!ne.entryPrice||!ne.shares)return;
  S.entries.push({id:"e"+Date.now(),ticker:ne.ticker,date:ne.date,entryPrice:parseFloat(ne.entryPrice),shares:parseFloat(ne.shares),type:ne.type,notes:ne.notes,status:"open"});
  saveEntries();
  S.newEntry={ticker:"SPY",date:"",entryPrice:"",shares:"",type:"DCA",notes:""};
  S.tab="entries"; render();
}

function renderAnalysis(H) {
  renderInnerTabs([{id:"analyze",label:"Analyze"},{id:"history",label:"History"},{id:"rules",label:"Rules"}]);
  const t=S.tab;
  let html="";
 
  if(t==="analyze") {
    const a=S.analysis,step=S.analysisStep;
    let ascore=0;
    if(a.aboveMa50===true)ascore+=10;if(a.aboveMa200===true)ascore+=8;if(a.trendDirection==="UP")ascore+=7;
    if(a.higherHighs===true)ascore+=10;if(a.aboveKeySupport===true)ascore+=10;
    if(a.rsiCondition==="NEUTRAL")ascore+=8;if(a.rsiCondition==="OVERSOLD")ascore+=12;
    if(a.volumeConfirm===true)ascore+=8;
    if(["Early Uptrend","Accumulation"].includes(a.cyclePhase))ascore+=20;
    if(a.cyclePhase==="Late Uptrend")ascore+=10;

function aField(label, field, note) {
  const a=S.analysis,v=a[field];
  return `<div class="field"><div class="field-lbl">${label}</div>${note?`<div style="font-size:9px;color:#334155;margin-bottom:5px">${note}</div>`:""}

      <button class="yesno-btn" onclick="S.analysis.${field}=false;render()" style="background:${v===false?"rgba(239,68,68,0.2)":"transparent"};border:1px solid ${v===false?"#ef4444":"#1e2a3a"};color:${v===false?"#ef4444":"#475569"}">NO</button>
    </div>
  </div>`;
}
 
function aOpts(field, options, colorMap) {
  const a=S.analysis,v=a[field];
  return `<div class="opts">${options.map(opt=>{const c=colorMap?.[opt]||"#c9a84c";return`<button class="opt-btn" onclick="S.analysis.${field}='${opt}';render()" style="background:${v===opt?c+"30":"transparent"};border:1px solid ${v===opt?c:"#1e2a3a"};color:${v===opt?c:"#475569"}">${opt}</button>`;}).join("")}</div>`;
}
 
function selectAnalysisTicker(ticker) {
  const h=S.holdings.find(x=>x.t===ticker)||{};
  const tech=S.liveData?.technicals?.[ticker]||{};
  let rsiCond=null;
  if(tech.rsi){if(tech.rsi<35)rsiCond="OVERSOLD";else if(tech.rsi>70)rsiCond="OVERBOUGHT";else rsiCond="NEUTRAL";}
  const price=h.price||0;
  S.analysis={...S.analysis,
    ticker,
    name: HB.find(x=>x.t===ticker)?.n||"",
    currentPrice: S.isLive&&price?price.toFixed(2):S.analysis.currentPrice,
    s1: h.s1||S.analysis.s1,s2: h.s2||S.analysis.s2,r1: h.r1||S.analysis.r1,r2: h.r2||S.analysis.r2,
    rsiLevel: S.isLive&&tech.rsi?tech.rsi.toFixed(1):S.analysis.rsiLevel,
    rsiCondition: S.isLive&&rsiCond?rsiCond:S.analysis.rsiCondition,
    aboveMa50: S.isLive&&tech.ma50&&price?price>tech.ma50:S.analysis.aboveMa50,
    aboveMa200: S.isLive&&tech.ma200&&price?price>tech.ma200:S.analysis.aboveMa200,
    trendDirection: S.isLive&&tech.trend?(tech.trend==="UPTREND"?"UP":tech.trend==="DOWNTREND"?"DOWN":"SIDEWAYS"):S.analysis.trendDirection,
  };
  render();
}
 
function saveAnalysis(score, autoVerdict) {
  if(!S.analysis.ticker)return;
  const saved={...S.analysis,score,verdict:S.analysis.verdict||autoVerdict,id:Date.now()};
  S.savedAnalyses=[saved,...S.savedAnalyses];
  saveAnalyses();
  S.analysis={ticker:"",name:"",date:new Date().toISOString().split("T")[0],currentPrice:"",sector:"",aboveMa50:null,aboveMa200:null,trendDirection:null,higherHighs:null,aboveKeySupport:null,rsiLevel:"",rsiCondition:null,volumeConfirm:null,macdSignal:null,cyclePhase:null,relativeToQQQ:null,vsQQQ:null,vsSector:null,macroSupport:null,institutionalBias:null,s1:"",s2:"",r1:"",r2:"",verdict:null,dcaPrice:"",notes:""};
  S.analysisStep=1; S.tab="history"; render();
}

function saveHoldingEdit(ticker) {
  const avgEl = document.getElementById("edit_avg_"+ticker);

  if(!avgEl||!shEl) return;
  const avg = parseFloat(avgEl.value);

  if(isNaN(avg)||isNaN(sh)||avg<=0||sh<=0) {
    alert("Please enter valid numbers for avg cost and shares.");

  if(!S.holdingsOverride) S.holdingsOverride = {};
  S.holdingsOverride[ticker] = {
    avg: avg.toString(),
    sh:  sh.toString(),

function calcMacroSignals(H) {
  const m = S.liveData?.macro || {};
  const vix     = m.VIX?.current   || 20;
  const oil     = m.Oil?.current   || 85;
  const gold    = m.Gold?.current  || 3000;
  const y10     = m['10Y Yield']?.current || 4.3;
  const oilChg  = m.Oil?.week_chg  || 0;
  const yldChg  = m['10Y Yield']?.week_chg || 0;
  const C = H.filter(h=>!h.custom);
  const spyD  = C[0] ? ((C[0].price-C[0].avg)/C[0].avg)*100 : 0;
  const qqqD  = C[1] ? ((C[1].price-C[1].avg)/C[1].avg)*100 : 0;
  const xlvUp = C[7] && C[7].price>C[7].avg;
  const iauUp = C[8] && C[8].price>C[8].avg;
 
  // ── Recession Risk ──────────────────────────────────────
  let rr = 0;
  if(vix>30)rr+=25; else if(vix>25)rr+=15; else if(vix>20)rr+=5;
  if(spyD<-10)rr+=25; else if(spyD<-5)rr+=15; else if(spyD<-2)rr+=5;
  if(y10>5)rr+=15; else if(y10>4.5)rr+=5;
  if(xlvUp)rr+=10; if(iauUp)rr+=10;
  if(oilChg>15)rr+=10;
  rr=Math.min(rr,95);
 
  // ── Stagflation Risk ────────────────────────────────────
  let sf = 0;
  if(oil>110)sf+=35; else if(oil>95)sf+=20; else if(oil>85)sf+=10;
  if(y10>4.8)sf+=15; else if(y10>4.3)sf+=8;
  if(oilChg>10)sf+=20; else if(oilChg>5)sf+=10;
  if(spyD<0&&oil>90)sf+=15;
  sf=Math.min(sf,95);
 
  // ── Crash Probability ───────────────────────────────────
  let cp=0;
  if(spyD<-5)cp+=25; else if(spyD<-2)cp+=10;
  if(qqqD<-8)cp+=20; else if(qqqD<-4)cp+=10;
  if(xlvUp)cp+=15; if(iauUp)cp+=15;
  if(vix>25)cp+=15; if(C[0]&&C[0].price<C[0].s1)cp+=15;
  cp=Math.min(cp,95);
 
  // ── Fed Stance ──────────────────────────────────────────
  let fedStance="NEUTRAL", fedColor="#c9a84c";
  if(yldChg>8){fedStance="VERY HAWKISH";fedColor="#ef4444";}
  else if(yldChg>3){fedStance="HAWKISH";fedColor="#f97316";}
  else if(yldChg<-8){fedStance="VERY DOVISH";fedColor="#22c55e";}
  else if(yldChg<-3){fedStance="DOVISH";fedColor="#22c55e";}
 
  // ── Market Phase ────────────────────────────────────────
  const score=calcScore(H);
  let phase="MARKUP",phaseC="#22c55e",phaseDesc="";
  if(score>=70&&spyD>0){
    phase="MARKUP";phaseC="#22c55e";
    phaseDesc="Institutions accumulating. Growth leading. Full DCA at S1 zones.";
  } else if(score>=55){
    phase="ACCUMULATION";phaseC="#3b82f6";
    phaseDesc="Smart money building positions. Selective DCA on weakness only.";
  } else if(score>=35){
    phase="DISTRIBUTION";phaseC="#f97316";
    phaseDesc="Risk-off signals increasing. Rotate from growth to defensive.";
  } else {
    phase="MARKDOWN";phaseC="#ef4444";
    phaseDesc="Market in confirmed downtrend. Capital preservation mode.";
  }
 
  // ── Geopolitical Risk ───────────────────────────────────
  const geoRisk = oil>100?"HIGH":oil>85?"ELEVATED":"MODERATE";
  const geoColor= oil>100?"#ef4444":oil>85?"#f97316":"#c9a84c";
 
  return {rr,sf,cp,fedStance,fedColor,phase,phaseC,phaseDesc,
    geoRisk,geoColor,vix,oil,gold,y10,oilChg,yldChg,score};
}

        desc:sig.sf>=60?"High oil + rising yields + slowing growth = stagflation conditions. Favor IAU and XLV.":sig.sf>=30?"Oil elevated. Watch yield direction. Hold energy hedge.":"Inflation and growth in balance."},
      {l:"Crash Probability",v:sig.cp,c:sig.cp>=60?"#ef4444":sig.cp>=30?"#f97316":"#22c55e",
        status:sig.cp>=60?"DANGER":sig.cp>=30?"ELEVATED":"MINIMAL",
        desc:sig.cp>=60?"Crash signals elevated. Capital preservation mode. No new entries.":sig.cp>=30?"Some stress signals. Be selective. Size down.":"Conditions stable. Normal DCA appropriate."},

    indicators.forEach(ind=>{
      html += `<div class="card card-accent" style="border-left-color:${ind.c};margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <span style="font-size:12px;font-weight:bold;color:${ind.c};">${ind.l}</span>
          <div style="text-align:right;"><div style="font-size:16px;font-weight:bold;color:${ind.c};">${ind.v}%</div><div style="font-size:9px;color:${ind.c};">${ind.status}</div></div>
        </div>
        <div class="bar-wrap" style="height:6px;margin-bottom:8px;"><div class="bar-fill" style="width:${ind.v}%;background:${ind.c};"></div></div>
        <div style="font-size:10px;color:#64748b;line-height:1.4;">${ind.desc}</div>
      </div>`;
    });
 
    // Fed/Rates card
    html += `<div class="card card-accent" style="border-left-color:${sig.fedColor};">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
        <span style="font-size:12px;font-weight:bold;color:${sig.fedColor};">🏦 Fed / Rates Impact</span>
        <span style="font-size:11px;color:${sig.fedColor};">${sig.fedStance}</span>
      </div>
      <div style="font-size:10px;color:#64748b;line-height:1.6;">
        10Y Yield: <strong style="color:#fff;">${sig.y10.toFixed(2)}%</strong> (${sig.yldChg>=0?"+":""}${sig.yldChg.toFixed(1)}% WoW)<br>
        ${sig.fedStance.includes("HAWKISH")?"→ Rising yields pressure QQQ/NVDA/SOXX valuations. Growth stocks face headwind.":
          sig.fedStance.includes("DOVISH")?"→ Falling yields support growth stocks. Bullish for QQQ/NVDA/SOXX.":
          "→ Stable yields. Neutral for portfolio. No immediate rate-driven action needed."}
      </div>
    </div>`;
 
    // Energy/Geopolitical card
    html += `<div class="card card-accent" style="border-left-color:${sig.geoColor};">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
        <span style="font-size:12px;font-weight:bold;color:${sig.geoColor};">🛢 Energy / Geopolitical</span>
        <span style="font-size:11px;color:${sig.geoColor};">${sig.geoRisk}</span>
      </div>
      <div style="font-size:10px;color:#64748b;line-height:1.6;">
        Oil WTI: <strong style="color:#fff;">$${sig.oil.toFixed(0)}</strong> (${sig.oilChg>=0?"+":""}${sig.oilChg.toFixed(1)}% WoW)<br>
        ${sig.oil>100?"⚠️ Oil above $100 — inflation pressure active. Hormuz disruption ongoing. IAU and XLE are your hedges.":
          sig.oil>85?"⚠️ Oil elevated. Monitor for further spike. XLE custom position serving hedge role.":
          "✓ Oil at manageable levels. Inflation from energy not a major concern."}
      </div>
    </div>`;
 
    // Trump/Policy card
    html += `<div class="card" style="border-left:3px solid #6b7280;">
      <div style="font-size:12px;font-weight:bold;color:#94a3b8;margin-bottom:5px;">🏛 Policy / Regulatory Watch</div>
      <div style="font-size:10px;color:#64748b;line-height:1.7;">
        ${sig.fedStance.includes("HAWKISH")?"→ <strong style='color:#fff;'>Tariff impact</strong>: Elevated oil + tariff inflation = Fed constrained. Watch for Treasury volatility.<br>":""}
        → <strong style="color:#fff;">AI Policy</strong>: Trump AI Action Plan accelerating data center approvals. Bullish DTCR, GRID, XLU.<br>
        → <strong style="color:#fff;">Energy Policy</strong>: Domestic production push. XLE benefits from deregulation.<br>
        → <strong style="color:#fff;">Nuclear</strong>: Trump directing Big Tech to build their own power plants. URA/NLR direct beneficiary.
      </div>
    </div>`;
  }
 
  // ── STRATEGY TAB ─────────────────────────────────────────
  if(t==="strategy") {
    const strat=getPhaseStrategy(sig,H);
 
    html += `<div class="card" style="background:${strat.color}10;border-color:${strat.color}40;margin-bottom:10px;text-align:center;padding:16px;">
      <div style="font-size:9px;color:${strat.color};letter-spacing:2px;margin-bottom:4px;">PORTFOLIO STRATEGY — ${sig.phase}</div>
      <div style="font-size:15px;font-weight:bold;color:${strat.color};">${strat.action}</div>
    </div>`;
 
    // Buy / Hold / Trim / Avoid
    [
      {label:"✅ BUY NOW",items:strat.buy,c:"#22c55e"},
      {label:"⏳ HOLD",items:strat.hold,c:"#c9a84c"},
      {label:"✂️ TRIM",items:strat.trim,c:"#3b82f6"},
      {label:"🚫 AVOID",items:strat.avoid,c:"#ef4444"},
    ].forEach(section=>{
      html += `<div class="card card-accent" style="border-left-color:${section.c};margin-bottom:8px;">
        <div style="font-size:10px;font-weight:bold;color:${section.c};margin-bottom:6px;">${section.label}</div>
        ${section.items.map(item=>`<div style="display:flex;gap:8px;padding:4px 0;border-top:1px solid #1e2a3a;font-size:10px;color:#64748b;"><span style="color:${section.c};flex-shrink:0;">→</span>${item}</div>`).join("")}
      </div>`;
    });
 
    // Outlook
    html += `<div class="card" style="margin-top:4px;">
      <div class="card-lbl">OUTLOOK</div>
      <div style="padding:8px 0;border-bottom:1px solid #1e2a3a;">
        <div style="font-size:9px;color:#c9a84c;margin-bottom:3px;">30-DAY VIEW</div>
        <div style="font-size:10px;color:#94a3b8;line-height:1.5;">${strat.o30}</div>
      </div>
      <div style="padding:8px 0;">
        <div style="font-size:9px;color:#3b82f6;margin-bottom:3px;">90-DAY VIEW</div>
        <div style="font-size:10px;color:#94a3b8;line-height:1.5;">${strat.o90}</div>
      </div>
    </div>`;
 
    // Weekly DCA reminder
    html += `<div class="card" style="background:rgba(139,92,246,0.08);border-color:rgba(139,92,246,0.3);margin-top:4px;">
      <div class="card-lbl" style="color:#8b5cf6;">💜 WEEKLY $25-50 DCA ROTATION</div>
      ${[
        {w:"Week 1",t:"URA",p:"$56.16",r:"Nuclear AI power · 120% 1yr return"},
        {w:"Week 2",t:"DTCR",p:"$22.56",r:"Data center infra · 28% YTD"},
        {w:"Week 3",t:"COPX",p:"~$79-82",r:"Copper supercycle · near MA50"},
        {w:"Week 4",t:"XLU",p:"~$48",r:"AI power utility · 0.08% expense"},
      ].map(row=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-top:1px solid #1e2a3a;font-size:10px;">
        <span style="color:#475569;">${row.w}</span>
        <span style="color:#8b5cf6;font-weight:bold;">${row.t}</span>
        <span style="color:#fff;">${row.p}</span>
        <span style="color:#334155;font-size:9px;">${row.r}</span>
      </div>`).join("")}
    </div>`;
  }
 
  document.getElementById("content").innerHTML = html;
}

// CUSTOM HOLDINGS FUNCTIONS
// ═══════════════════════════════════════════════════════════
function addCustomHolding() {
  const nc = S.newCustom;
  if(!nc.ticker||!nc.avg||!nc.shares) { alert("Please fill in Ticker, Avg Cost, and Shares."); return; }
  if(!S.customHoldings) S.customHoldings=[];
  // Check for duplicate
  if(S.customHoldings.find(h=>h.ticker===nc.ticker)) {
    alert(nc.ticker+" already exists in your custom holdings. Edit it instead.");
    return;
  }
  S.customHoldings.push({
    ticker:  nc.ticker,
    name:    nc.name||nc.ticker,
    avg:     nc.avg,
    shares:  nc.shares,
    date:    nc.date||new Date().toISOString().split("T")[0],
    notes:   nc.notes,
    addedAt: new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})
  });
  saveCustom();
  S.newCustom={ticker:"",name:"",avg:"",shares:"",date:"",notes:""};
  S.editingCustom=null;
  render();
}
 
function updateCustomHolding(idx) {
  const avgEl=document.getElementById("ec_avg_"+idx);
  const shEl =document.getElementById("ec_sh_"+idx);
  if(!avgEl||!shEl)return;
  const avg=parseFloat(avgEl.value), sh=parseFloat(shEl.value);
  if(isNaN(avg)||isNaN(sh)||avg<=0||sh<=0){alert("Invalid values.");return;}
  S.customHoldings[idx].avg=avg.toString();
  S.customHoldings[idx].shares=sh.toString();
  S.customHoldings[idx].updatedAt=new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  saveCustom();
  S.editingCustom=null;
  render();
}
 
function deleteCustomHolding(idx) {
  const ticker=S.customHoldings[idx]?.ticker||"this holding";
  if(!confirm("Delete "+ticker+" from custom holdings?"))return;
  S.customHoldings.splice(idx,1);
  saveCustom();
  S.editingCustom=null;
  render();
}
